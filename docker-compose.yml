services:
  dental-caries-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dental-caries-app
    ports:
      - "5000:5000"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      FLASK_DEBUG: "false"
    volumes:
      - ./backend/models:/app/backend/models
      - ./backend/uploads:/app/backend/uploads
    restart: unless-stopped
